<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Inventory Item</title>
	<link rel="stylesheet" href="style.css" />
	<meta name="viewport" content="width=device-width,initial-scale=1"/>
</head>
<body>
	<header>
		<ul>
			<li>
				<a href="#add_or_edit_form">Add/Edit Form</a>
			</li>
			<li>
				<a href="#item_list_anchor">Item List</a>
			</li>
			<li>
				<a href="#popular_item_list_anchor">Popular Item List</a>
			</li>
			<li>
				<a href="#search_anchor">Search</a>
			</li>
		</ul>
	</header>
	<div class="header-background"></div>
	<div id="add_or_edit_form" class="add-or-edit-wrapper">
		<h2>Add/Edit Item</h2>
		<div class="add-or-edit">
			<div class="form-control">
				<div class="label">*Item ID: </div>
				<input placeholder="Item ID" id="itemId" />
			</div>
			<div class="form-control">
				<div class="label">*Item name: </div>
				<input placeholder="Item name" id="itemName" />
			</div>
			<div class="form-control">
				<div class="label">*Category: </div>
				<select id="category">
					<option>Electronics</option>
					<option>Furniture</option>
					<option>Clothing</option>
					<option>Tools</option>
					<option>Miscellaneous</option>
				</select>
			</div>
			<div class="form-control">
				<div class="label">*Quantity: </div>
				<input placeholder="Quantity" id="quantity" type="number" min="0" step="1" />
			</div>
			<div class="form-control">
				<div class="label">*Price: </div>
				<input placeholder="Price" id="price" type="number" min="0" step="0.01" />
			</div>
			<div class="form-control">
				<div class="label">*Supplier Name: </div>
				<input placeholder="Supplier Name" id="supplierName" />
			</div>
			<div class="form-control">
				<div class="label">*Stock Status: </div>
				<select id="stockStatus">
					<option>In Stock</option>
					<option>Low Stock</option>
					<option>Out of Stock</option>
				</select>
			</div>
			<div class="form-control">
				<div class="label">*Popular Item: </div>
				<input type="checkbox" placeholder="Popular Item" id="popularItem" />
			</div>
			<div class="form-control">
				<div class="label">Comment: </div>
				<input placeholder="Comment" id="comment" />
			</div>
		</div>
		<div class="row">
			<button onclick="addItem()">Save Item</button>
		</div>
		<div id="message" class="message"></div>
	</div>
	<h2 id="item_list_anchor">Item List</h2>
	<ul id="list"></ul>
	<h2 id="popular_item_list_anchor">Popular Item List</h2>
	<ul id="popular_list"></ul>
	<h2 id="search_anchor">Search Item</h2>
	<div class="row">
		<div class="form-control">
			<input placeholder="Item Name" type="text" id="sName">
			<button onclick="searchItem()">Search Item</button>
		</div>
	</div>
	<div id="search_result"></div>
	<script src="app.js"></script>
</body>
</html>
